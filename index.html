<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HIP-HOP Harmony</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Montserrat', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #111;
      color: #fff;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    .logo {
      font-size: 40px;
      font-weight: 700;
      letter-spacing: 3px;
      margin-bottom: 20px;
    }

    .welcome {
      font-size: 18px;
      margin-bottom: 40px;
      color: #ccc;
    }

    .start-btn {
      padding: 12px 35px;
      font-size: 16px;
      font-weight: 600;
      border: 2px solid #fff;
      background: transparent;
      color: #fff;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 1px;
    }

    .start-btn:hover {
      background: #fff;
      color: #111;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="logo">HIP-HOP Harmony</div>
    <div class="welcome">Welcome to our Dance Showcase Experience</div>
    <button class="start-btn" onclick="startShow()">START</button>
  </div>

  <script>
    function startShow() {
      alert("Let the showcase begin!");
      // You can redirect like this:
      // window.location.href = "showcase.html";
    }
  </script>
</body>
</html>
